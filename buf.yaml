version: v2
modules:
  - path: api/proto
deps:
  - buf.build/googleapis/googleapis
  - buf.build/grpc-ecosystem/grpc-gateway
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX      # allow v1alpha1 without requiring it in package names
    - RPC_REQUEST_STANDARD_NAME   # Input/Filter suffixes are intentional; *Request would collide with the ElevationRequest domain object
breaking:
  use:
    - FILE
