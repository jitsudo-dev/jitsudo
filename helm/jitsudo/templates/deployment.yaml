apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jitsudo.fullname" . }}
  labels:
    {{- include "jitsudo.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "jitsudo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "jitsudo.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jitsudo.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: jitsudod
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config=/etc/jitsudo/config.yaml"
          env:
            {{- include "jitsudo.databaseURLEnv" . | nindent 12 }}
            {{- if .Values.config.notifications.slack.enabled }}
            {{- if .Values.config.notifications.slack.existingSecret }}
            - name: JITSUDOD_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.notifications.slack.existingSecret }}
                  key: JITSUDOD_SLACK_WEBHOOK_URL
            {{- else if .Values.config.notifications.slack.webhookUrl }}
            - name: JITSUDOD_SLACK_WEBHOOK_URL
              value: {{ .Values.config.notifications.slack.webhookUrl | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.notifications.smtp.enabled }}
            {{- if .Values.config.notifications.smtp.existingSecret }}
            - name: JITSUDOD_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.notifications.smtp.existingSecret }}
                  key: JITSUDOD_SMTP_PASSWORD
            {{- else if .Values.config.notifications.smtp.password }}
            - name: JITSUDOD_SMTP_PASSWORD
              value: {{ .Values.config.notifications.smtp.password | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.mcp.enabled }}
            {{- if .Values.config.mcp.existingSecret }}
            - name: JITSUDOD_MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.mcp.existingSecret }}
                  key: JITSUDOD_MCP_TOKEN
            {{- else if .Values.config.mcp.token }}
            - name: JITSUDOD_MCP_TOKEN
              value: {{ .Values.config.mcp.token | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.config.mcpAgent.enabled }}
            - name: JITSUDOD_MCP_AGENT_ADDR
              value: {{ .Values.config.mcpAgent.addr | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ trimPrefix ":" .Values.config.server.httpAddr | int }}
              protocol: TCP
            - name: grpc
              containerPort: {{ trimPrefix ":" .Values.config.server.grpcAddr | int }}
              protocol: TCP
            {{- if .Values.config.mcpAgent.enabled }}
            - name: mcp-agent
              containerPort: {{ trimPrefix ":" .Values.config.mcpAgent.addr | int }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/jitsudo
              readOnly: true
            {{- if .Values.config.tls.enabled }}
            - name: tls
              mountPath: /etc/jitsudo/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "jitsudo.fullname" . }}
        {{- if .Values.config.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.config.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
