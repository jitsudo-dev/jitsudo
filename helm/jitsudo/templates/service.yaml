apiVersion: v1
kind: Service
metadata:
  name: {{ include "jitsudo.fullname" . }}
  labels:
    {{- include "jitsudo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.http.type }}
  selector:
    {{- include "jitsudo.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
    {{- if .Values.config.mcpAgent.enabled }}
    - name: mcp-agent
      port: {{ .Values.service.mcpAgent.port }}
      targetPort: mcp-agent
      protocol: TCP
    {{- end }}
