# jitsudod minimal configuration — required fields only.
# Suitable as a starting point when you only need the mock provider
# (for demos, local dev, or gradual onboarding).
#
# Generated by: jitsudod init --db-url ... --oidc-issuer ... --oidc-client-id ...

database:
  url: "postgres://jitsudo:password@localhost:5432/jitsudo?sslmode=disable"

auth:
  oidc_issuer: "https://your-idp.example.com"
  client_id: "jitsudo-server"
