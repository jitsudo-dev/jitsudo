version: "3.9"

# Local development environment for jitsudo.
# Starts: jitsudod control plane, PostgreSQL, and dex (mock OIDC provider).
#
# Usage:
#   make docker-up    # start
#   make docker-down  # stop
#   make docker-logs  # tail logs
#
# After starting, configure the CLI:
#   jitsudo login --provider http://localhost:5556/dex

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jitsudo
      POSTGRES_PASSWORD: jitsudo
      POSTGRES_DB: jitsudo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jitsudo"]
      interval: 5s
      timeout: 5s
      retries: 5

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  jitsudod:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.jitsudod
    environment:
      JITSUDOD_HTTP_ADDR: ":8080"
      JITSUDOD_GRPC_ADDR: ":8443"
      JITSUDOD_DATABASE_URL: "postgres://jitsudo:jitsudo@postgres:5432/jitsudo?sslmode=disable"
      JITSUDOD_OIDC_ISSUER: "http://dex:5556/dex"
      JITSUDOD_OIDC_CLIENT_ID: "jitsudo-server"
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      dex:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
