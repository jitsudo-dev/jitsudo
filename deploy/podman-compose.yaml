version: "3.9"

# Podman Compose variant of the local development environment.
# Functionally identical to docker-compose.yaml.
#
# Usage: podman-compose up

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: jitsudo
      POSTGRES_PASSWORD: jitsudo
      POSTGRES_DB: jitsudo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    ports:
      - "5556:5556"
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro

  jitsudod:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.jitsudod
    environment:
      JITSUDOD_HTTP_ADDR: ":8080"
      JITSUDOD_GRPC_ADDR: ":8443"
      JITSUDOD_DATABASE_URL: "postgres://jitsudo:jitsudo@postgres:5432/jitsudo?sslmode=disable"
      JITSUDOD_OIDC_ISSUER: "http://dex:5556/dex"
      JITSUDOD_OIDC_CLIENT_ID: "jitsudo-server"
    ports:
      - "8080:8080"
      - "8443:8443"

volumes:
  postgres_data:
